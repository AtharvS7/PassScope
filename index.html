<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PassScope - Password Strength Analyzer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
</head>
<body>
  <div class="app-container">
    <div class="card">
      <header class="header">
        <h1 class="title">PassScope</h1>
        <p class="subtitle">Password Strength Analyzer</p>
      </header>

      <div class="input-section">
        <div class="password-input-wrapper">
          <input type="password" id="passwordInput" class="password-input" placeholder="Enter your password..." autocomplete="off" aria-label="Password input">
          <button class="toggle-visibility" id="toggleVisibility" aria-label="Toggle password visibility" type="button">
            <svg class="eye-icon" id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="eye-off-icon hidden" id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
          <button class="reset-btn" id="resetBtn" aria-label="Clear password" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </div>

      <div class="strength-section">
        <div class="strength-label"><span>Password Strength:</span><span id="strengthText" class="strength-text">Enter a password</span></div>
        <div class="strength-meter"><div class="strength-bar" id="strengthBar"></div></div>
      </div>

      <div class="metrics-section">
        <div class="metric">
          <div class="metric-label">Security Score</div>
          <div class="metric-value"><span id="scoreValue">0</span><span class="metric-max">/ 100</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">Estimated Crack Time</div>
          <div class="metric-value" id="crackTime">--</div>
        </div>
        <div class="metric">
          <div class="metric-label">Hack Probability</div>
          <div class="metric-value"><span id="hackProbability">--</span></div>
        </div>
      </div>

      <div class="tips-section hidden" id="tipsSection">
        <h3 class="tips-title">Suggestions to improve</h3>
        <ul class="tips-list" id="tipsList"></ul>
      </div>

      <footer class="privacy-notice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        <span>Passwords are analyzed locally in your browser. Nothing is stored or transmitted.</span>
      </footer>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
